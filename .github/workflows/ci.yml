name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # prek needs full history to diff commits

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run pre-commit hooks (changed files only on PRs)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uvx prek run --from-ref origin/${{ github.base_ref }} --to-ref HEAD
          else
            uvx prek run --all-files
          fi

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-branch --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false # don't block on Codecov outages

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Audit dependencies for vulnerabilities
        run: uv audit --preview

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            core/ domains/

  docker-smoke:
    name: Docker integration smoke test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Build and start stack
        run: docker compose up -d --build --wait --wait-timeout 60

      - name: Health checks
        run: |
          curl -fsS http://localhost:8080/health/live | jq -e '.status == "ok"'
          curl -fsS http://localhost:8080/health/ready | jq -e '.internal_db.healthy == true'

      - name: Provision test API key
        run: |
          KEY_HASH=$(echo -n "sk_test_ci" | sha256sum | cut -d' ' -f1)
          docker compose exec -T postgres psql -U mcp -d mcp_platform -c "
            INSERT INTO core.api_keys (key_id, key_hash, owner_id, owner_label, scopes, rate_limit_rpm, is_active)
            VALUES ('key_ci', '${KEY_HASH}', 'usr_ci', 'CI smoke test', ARRAY['gse:*:*'], 120, true)
            ON CONFLICT (key_id) DO NOTHING;
          "

      - name: MCP initialize
        run: |
          curl -fsS http://localhost:8080/mcp \
            -H "Authorization: Bearer sk_test_ci" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0.1.0"}}}' \
          | jq -e '.result.serverInfo.name == "gse-mcp"'

      - name: MCP tools/list
        run: |
          TOOLS=$(curl -fsS http://localhost:8080/mcp \
            -H "Authorization: Bearer sk_test_ci" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$TOOLS" | jq .
          TOOL_COUNT=$(echo "$TOOLS" | jq '.result.tools | length')
          if [ "$TOOL_COUNT" -lt 5 ]; then
            echo "::error::Expected at least 5 tools, got $TOOL_COUNT"
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail 50

  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # scan full git history

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
