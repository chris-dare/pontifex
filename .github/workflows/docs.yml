name: Docs

# Build the Zensical docs and publish to GitHub Pages.
#   - Pull requests touching docs/ : build only (a validation gate we own).
#   - Push to main                 : build + deploy to GitHub Pages.
#
# Zensical is a Python tool (the `docs` dependency group), so the whole thing runs
# on uv — no Node. Actions are SHA-pinned; Dependabot keeps them current.
#
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".

on:
  pull_request:
    paths: ["docs/**", "zensical.toml", ".github/workflows/docs.yml"]
  push:
    branches: [main]
    paths: ["docs/**", "zensical.toml", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build site
        run: uv run --group docs zensical build --clean

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
