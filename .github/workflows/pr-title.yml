name: PR title

# PRs merge via squash, and the squash commit subject is the PR title
# (repo setting: squash_merge_commit_title=PR_TITLE). Linting the title here keeps
# main's history Conventional Commits compliant.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
