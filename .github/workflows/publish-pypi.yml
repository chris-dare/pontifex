name: Publish to PyPI

# Token-less publishing via PyPI Trusted Publishing (OIDC). No API tokens stored.
#   - Manual TestPyPI dry-run: Actions -> this workflow -> Run workflow.
#   - Real PyPI publish: cut a GitHub Release tagged vX.Y.Z (must match
#     core/pyproject.toml version). Real PyPI is release-ONLY — there is no manual
#     path to it — so the tag/version guard below always applies, and the publish
#     waits on the `pypi` environment's required reviewer.
# Only `pontifex-mcp` is ever published — never the `gse-mcp` demo.
#
# Actions are SHA-pinned (mutable tags are a supply-chain risk in a credentialed
# workflow). Dependabot's github-actions ecosystem keeps the pins current.

on:
  release:
    types: [published]
  workflow_dispatch: {} # manual TestPyPI dry-run only

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Assert release tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          PYPROJECT_VERSION="$(uv version --package pontifex-mcp --short)"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject=$PYPROJECT_VERSION  tag=$TAG"
          if [ "$PYPROJECT_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($GITHUB_REF_NAME) does not match core/pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel (pontifex-mcp only)
        run: uv build --package pontifex-mcp --out-dir dist/

      - name: Guard — no gse-mcp artifact may be published
        run: |
          ls -la dist/
          if ls dist/ | grep -iq 'gse'; then
            echo "::error::gse-mcp artifact found in dist/ — only pontifex-mcp may be published"
            exit 1
          fi

      - name: Check distribution metadata renders
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pontifex-mcp
    permissions:
      id-token: write # OIDC token for trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/pontifex-mcp
    permissions:
      id-token: write # OIDC token for trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Defaults to https://upload.pypi.org/legacy/ and emits PEP 740
        # attestations (signed provenance) automatically under trusted publishing.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
