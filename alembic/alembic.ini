[alembic]
# The core branch + env.py ship inside the pontifex-mcp package; this monorepo
# config adds the demo `gse` branch on top so contributors run both at once.
# (`core/` is on disk in every context that runs this: source checkouts, the
# GSE Dockerfile's `COPY core/ core/`, and CI.)
script_location = core/pontifex_mcp/migrations
version_locations = core/pontifex_mcp/migrations/versions alembic/domains/gse/versions
sqlalchemy.url = postgresql+asyncpg://mcp:mcp@localhost:5432/mcp_platform

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
