[alembic]
# Paths resolve relative to this file (%(here)s), so the config works wherever
# the wheel is installed. `db upgrade` loads it via importlib.resources.
script_location = %(here)s
version_locations = %(here)s/versions
# sqlalchemy.url is left unset on purpose: env.py reads DATABASE_URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
