name: pontifex-integration

# Token-exchange integration stack (#41): real Keycloak (RFC 8693), Postgres,
# Redis, a downstream resource server that validates audience, and the Pontifex
# HTTP MCP server. The `test` service (profile: test) runs the assertions.
#
#   docker compose up -d --build           # bring up the stack
#   docker compose run --rm test           # run the integration checks
#   docker compose down -v                 # tear down

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pontifex
      POSTGRES_PASSWORD: pontifex
      POSTGRES_DB: pontifex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pontifex"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-pontifex.json:/opt/keycloak/data/import/realm-pontifex.json:ro
    ports:
      - "8080:8080"

  migrate:
    image: pontifex-integration:latest
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    command: ["uv", "run", "--package", "pontifex-mcp", "alembic", "-c", "alembic/alembic.ini", "upgrade", "heads"]
    environment:
      DATABASE_URL: postgresql+asyncpg://pontifex:pontifex@postgres:5432/pontifex
    depends_on:
      postgres:
        condition: service_healthy

  downstream:
    image: pontifex-integration:latest
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    command: ["uv", "run", "--package", "pontifex-mcp", "uvicorn", "downstream_app:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "tests/integration"]
    environment:
      OIDC_ISSUER: http://keycloak:8080/realms/pontifex
      OIDC_JWKS_URL: http://keycloak:8080/realms/pontifex/protocol/openid-connect/certs
    depends_on:
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  pontifex:
    image: pontifex-integration:latest
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    command: ["uv", "run", "--package", "pontifex-mcp", "uvicorn", "pontifex_app:app", "--host", "0.0.0.0", "--port", "8080", "--app-dir", "tests/integration"]
    environment:
      DATABASE_URL: postgresql+asyncpg://pontifex:pontifex@postgres:5432/pontifex
      REDIS_URL: redis://redis:6379/0
      AUTH_JWKS_URL: http://keycloak:8080/realms/pontifex/protocol/openid-connect/certs
      AUTH_ISSUER: http://keycloak:8080/realms/pontifex
      AUTH_AUDIENCE: pontifex
      AUTH_SCOPES_CLAIM: permissions
      PONTIFEX_CONNECTORS_CONFIG: tests/integration/connectors.yaml
      PONTIFEX_OAUTH_CLIENT_ID: pontifex
      PONTIFEX_OAUTH_CLIENT_SECRET: pontifex-secret
      # Exercise the shared Redis token cache with encryption-at-rest (#47).
      PONTIFEX_TOKEN_CACHE: redis
      PONTIFEX_TOKEN_CACHE_KEY: 42EKL1aTrCJtrhOEJpULzoFrQNYNfcaVMaaivInzMLA= # gitleaks:allow (test-only)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      downstream:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live')\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  test:
    image: pontifex-integration:latest
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    command: ["uv", "run", "--package", "pontifex-mcp", "python", "tests/integration/run_integration.py"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      PONTIFEX_URL: http://pontifex:8080
      DOWNSTREAM_URL: http://downstream:8000
      PG_DSN: postgresql://pontifex:pontifex@postgres:5432/pontifex
      REDIS_URL: redis://redis:6379/0
    depends_on:
      pontifex:
        condition: service_healthy
      downstream:
        condition: service_healthy
    profiles: ["test"]
